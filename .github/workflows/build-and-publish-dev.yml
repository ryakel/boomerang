name: Docker Builder (Dev)

on:
  workflow_dispatch:
  push:
    branches:
      - dev
    paths-ignore:
      - "*.md"
      - "docs/**"
      - "wiki/**"
      - ".github/**"
      - "LICENSE*"
      - ".gitignore"
      - "CLAUDE.md"
  pull_request:
    branches: [dev]
    paths-ignore:
      - "*.md"
      - "docs/**"
      - "wiki/**"
      - ".github/**"
      - "LICENSE*"
      - ".gitignore"
      - "CLAUDE.md"

permissions:
  contents: read
  packages: write

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:
  docker:
    name: Build and Publish (Dev)
    runs-on: ubuntu-latest
    steps:

      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Build frontend
        run: npm run build

      - name: Smoke test
        run: |
          PORT=3002 DB_PATH=./test-smoke.db node server.js &
          sleep 2
          curl -sf http://localhost:3002/api/health
          curl -sf http://localhost:3002/ | grep -q '<div id="root">'
          JS_FILE=$(curl -s http://localhost:3002/ | grep -o 'src="/assets/index-[^"]*\.js"' | head -1 | sed 's/src="//;s/"//')
          curl -sf http://localhost:3002${JS_FILE} | node -e "let d='';process.stdin.on('data',c=>d+=c);process.stdin.on('end',()=>{try{new Function(d);console.log('JS OK')}catch(e){console.error('JS FAIL:',e.message);process.exit(1)}})"
          kill %1 2>/dev/null || true
          rm -f ./test-smoke.db

      - name: Set up QEMU
        if: github.event_name != 'pull_request'
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        if: github.event_name != 'pull_request'
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        if: github.event_name != 'pull_request'
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set Dev Version
        id: devver
        run: echo "version=dev-${GITHUB_SHA::7}" >> $GITHUB_OUTPUT

      - name: Build and Push Dev Image
        if: github.event_name != 'pull_request'
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          platforms: linux/amd64,linux/arm64
          build-args: APP_VERSION=${{ steps.devver.outputs.version }}
          tags: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:dev
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build Dev Docker Image (PR — no push)
        if: github.event_name == 'pull_request'
        uses: docker/build-push-action@v6
        with:
          context: .
          push: false
          tags: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:dev

      - name: Connect to Tailscale
        if: github.event_name != 'pull_request'
        continue-on-error: true
        id: tailscale
        uses: tailscale/github-action@v2
        with:
          oauth-client-id: ${{ secrets.TS_OAUTH_CLIENT_ID }}
          oauth-secret: ${{ secrets.TS_OAUTH_SECRET }}
          tags: tag:ci

      - name: Trigger Portainer redeploy
        if: github.event_name != 'pull_request'
        run: |
          if [ "${{ steps.tailscale.outcome }}" != "success" ]; then
            echo "::error::Tailscale connection failed (outcome=${{ steps.tailscale.outcome }}). Portainer auto-deploy skipped — dev image is in GHCR but the running container will not auto-update. Pull the new image manually."
            exit 1
          fi
          echo "Triggering Portainer webhook (dev)..."
          HTTP_CODE=$(curl -sS -o /tmp/portainer-response.txt -w "%{http_code}" -X POST "${{ secrets.PORTAINER_DEV_WEBHOOK_URL }}")
          BODY=$(cat /tmp/portainer-response.txt 2>/dev/null || echo "<empty>")
          echo "Portainer HTTP status: $HTTP_CODE"
          echo "Portainer response body: $BODY"
          if [ "$HTTP_CODE" -lt 200 ] || [ "$HTTP_CODE" -ge 300 ]; then
            echo "::error::Portainer dev webhook returned $HTTP_CODE. Check that PORTAINER_DEV_WEBHOOK_URL secret matches the current stack webhook (regenerated after Portainer self-updates) and that the stack has 'auto-update on webhook' enabled."
            exit 1
          fi

      - name: Verify deploy
        if: github.event_name != 'pull_request' && steps.tailscale.outcome == 'success'
        env:
          HEALTH_URL: ${{ secrets.HEALTH_CHECK_DEV_URL }}
          EXPECTED: ${{ steps.devver.outputs.version }}
        run: |
          if [ -z "$HEALTH_URL" ]; then
            echo "HEALTH_CHECK_DEV_URL secret not set — skipping deploy verification."
            echo "(Add a secret named HEALTH_CHECK_DEV_URL pointing at https://your-dev-host/api/health to enable end-to-end deploy confirmation.)"
            exit 0
          fi
          echo "Waiting for dev deploy to land — expecting appVersion=$EXPECTED at $HEALTH_URL"
          for i in 1 2 3 4 5 6; do
            sleep 20
            ACTUAL=$(curl -fsS --max-time 5 "$HEALTH_URL" 2>/dev/null | jq -r '.appVersion // empty' 2>/dev/null || echo "")
            echo "Attempt $i/6 (~${i}0s in): appVersion=${ACTUAL:-<unreachable>}"
            if [ "$ACTUAL" = "$EXPECTED" ]; then
              echo "Dev deploy confirmed: server is on $ACTUAL"
              exit 0
            fi
          done
          echo "::error::After ~2min, $HEALTH_URL still reports appVersion='$ACTUAL' (expected '$EXPECTED'). Portainer received the webhook but the dev container did not redeploy with the new image."
          exit 1
