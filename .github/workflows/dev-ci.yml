name: Dev Branch CI

on:
  push:
    branches:
      - dev
    paths-ignore:
      - "*.md"
      - "docs/**"
      - "wiki/**"
      - ".github/**"
      - "LICENSE*"
      - ".gitignore"
      - "CLAUDE.md"
  pull_request:
    branches: [dev]
    paths-ignore:
      - "*.md"
      - "docs/**"
      - "wiki/**"
      - ".github/**"
      - "LICENSE*"
      - ".gitignore"
      - "CLAUDE.md"

permissions:
  contents: read
  packages: write

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:
  build-and-test:
    name: Build & Test (Dev)
    runs-on: ubuntu-latest
    steps:

      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Build frontend
        run: npm run build

      - name: Smoke test
        run: |
          DB_PATH=./test-smoke.db node server.js &
          sleep 2
          curl -sf http://localhost:3001/api/health
          curl -sf http://localhost:3001/ | grep -q '<div id="root">'
          JS_FILE=$(curl -s http://localhost:3001/ | grep -o 'src="/assets/index-[^"]*\.js"' | head -1 | sed 's/src="//;s/"//')
          curl -sf http://localhost:3001${JS_FILE} | node -e "let d='';process.stdin.on('data',c=>d+=c);process.stdin.on('end',()=>{try{new Function(d);console.log('JS OK')}catch(e){console.error('JS FAIL:',e.message);process.exit(1)}})"
          kill %1 2>/dev/null || true
          rm -f ./test-smoke.db

      - name: Build Dev Docker Image
        uses: docker/build-push-action@v6
        with:
          context: .
          push: false
          tags: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:dev
