name: Docker Builder

on:
  workflow_dispatch:
  push:
    branches:
      - main
    tags:
      - "*"
    paths-ignore:
      - "*.md"
      - "docs/**"
      - "wiki/**"
      - ".github/**"
      - "LICENSE*"
      - ".gitignore"
      - "CLAUDE.md"
  pull_request:
    branches: [main]
    paths-ignore:
      - "*.md"
      - "docs/**"
      - "wiki/**"
      - ".github/**"
      - "LICENSE*"
      - ".gitignore"
      - "CLAUDE.md"

permissions:
  contents: write
  actions: write
  packages: write

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}
  # Opt all JS actions onto the runner's Node 24 ahead of GitHub's 2026-06-16
  # forced cutover (silences the Node 20 deprecation warnings). Reversible:
  # remove this line, or set ACTIONS_ALLOW_USE_UNSECURE_NODE_VERSION=true.
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

jobs:
  docker:
    name: Build and Publish
    runs-on: ubuntu-latest
    steps:

      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Build frontend
        run: npm run build

      - name: Smoke test
        run: |
          DB_PATH=./test-smoke.db node server/server.js &
          sleep 2
          curl -sf http://localhost:3001/api/health
          curl -sf http://localhost:3001/ | grep -q '<div id="root">'
          JS_FILE=$(curl -s http://localhost:3001/ | grep -o 'src="/assets/index-[^"]*\.js"' | head -1 | sed 's/src="//;s/"//')
          curl -sf http://localhost:3001${JS_FILE} -o /tmp/bundle.mjs && node --check /tmp/bundle.mjs && echo "JS OK"
          kill %1 2>/dev/null || true
          rm -f ./test-smoke.db

      - name: Set Docker Tag
        id: tag
        run: |
          if [[ $GITHUB_REF == refs/heads/main ]]; then
            DOCKER_TAG="latest"
          else
            DOCKER_TAG="${GITHUB_REF#refs/tags/}"
          fi
          echo "tag=${DOCKER_TAG}" >> $GITHUB_OUTPUT

      - name: Bump version and push tag
        if: github.ref == 'refs/heads/main'
        id: tag_version
        uses: mathieudutour/github-tag-action@v6.2
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          custom_release_rules: major:major,breaking:major,minor:minor,feat:minor,patch:patch,fix:patch,refactor:patch,perf:patch,chore:patch,style:patch,docs:patch,test:patch

      - name: Create a GitHub release
        if: github.ref == 'refs/heads/main'
        uses: ncipollo/release-action@v1
        with:
          tag: ${{ steps.tag_version.outputs.new_tag }}
          name: Release ${{ steps.tag_version.outputs.new_tag }}
          body: ${{ steps.tag_version.outputs.changelog }}

      - name: Set up QEMU
        if: github.event_name != 'pull_request'
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        if: github.event_name != 'pull_request'
        uses: docker/setup-buildx-action@v3
        with:
          # Route docker.io pulls through Google's mirror of Docker Hub official
          # images (node:22-alpine, etc.) — registry-1.docker.io intermittently
          # times out from GitHub runners on the base-image pull. mirror.gcr.io
          # is far more reliable; falls back to docker.io if it lacks an image.
          buildkitd-config-inline: |
            [registry."docker.io"]
              mirrors = ["mirror.gcr.io"]

      - name: Log in to GHCR
        if: github.event_name != 'pull_request'
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      # Tag push — build with just that tag
      - name: Build and Push Tag Image
        if: startsWith(github.ref, 'refs/tags/')
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          sbom: true
          provenance: mode=max
          platforms: linux/amd64,linux/arm64
          build-args: APP_VERSION=${{ steps.tag.outputs.tag }}
          tags: |
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ steps.tag.outputs.tag }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      # Main push — build with latest + auto-bumped version tag
      - name: Build and Push Main Image
        if: github.ref == 'refs/heads/main'
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          sbom: true
          provenance: mode=max
          platforms: linux/amd64,linux/arm64
          build-args: APP_VERSION=${{ steps.tag_version.outputs.new_tag }}
          tags: |
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ steps.tag.outputs.tag }}
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ steps.tag_version.outputs.new_tag }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Connect to Tailscale
        if: github.ref == 'refs/heads/main'
        continue-on-error: true
        id: tailscale
        uses: tailscale/github-action@v2
        with:
          oauth-client-id: ${{ secrets.TS_OAUTH_CLIENT_ID }}
          oauth-secret: ${{ secrets.TS_OAUTH_SECRET }}
          tags: tag:ci

      # The Tailscale OAuth connect occasionally fails transiently. Retry once
      # before giving up so a blip doesn't red-fail an otherwise-good build
      # (the image is already pushed to GHCR by this point).
      - name: Connect to Tailscale (retry)
        if: github.ref == 'refs/heads/main' && steps.tailscale.outcome != 'success'
        continue-on-error: true
        id: tailscale_retry
        uses: tailscale/github-action@v2
        with:
          oauth-client-id: ${{ secrets.TS_OAUTH_CLIENT_ID }}
          oauth-secret: ${{ secrets.TS_OAUTH_SECRET }}
          tags: tag:ci

      - name: Trigger Portainer redeploy
        if: github.ref == 'refs/heads/main'
        run: |
          if [ "${{ steps.tailscale.outcome }}" != "success" ] && [ "${{ steps.tailscale_retry.outcome }}" != "success" ]; then
            echo "::error::Tailscale failed on both attempts (transient retry exhausted). Portainer auto-deploy skipped — the image IS in GHCR (:latest), the container just didn't auto-update. Re-run this job, or pull the image manually in Portainer."
            exit 1
          fi
          echo "Triggering Portainer webhook..."
          HTTP_CODE=$(curl -sS --retry 3 --retry-delay 2 --retry-all-errors -o /tmp/portainer-response.txt -w "%{http_code}" -X POST "${{ secrets.PORTAINER_WEBHOOK_URL }}")
          BODY=$(cat /tmp/portainer-response.txt 2>/dev/null || echo "<empty>")
          echo "Portainer HTTP status: $HTTP_CODE"
          echo "Portainer response body: $BODY"
          if [ "$HTTP_CODE" -lt 200 ] || [ "$HTTP_CODE" -ge 300 ]; then
            echo "::error::Portainer webhook returned $HTTP_CODE. Check that PORTAINER_WEBHOOK_URL secret matches the current stack webhook (regenerated after Portainer self-updates) and that the stack has 'auto-update on webhook' enabled."
            exit 1
          fi

      - name: Verify deploy
        if: github.ref == 'refs/heads/main' && (steps.tailscale.outcome == 'success' || steps.tailscale_retry.outcome == 'success')
        env:
          HEALTH_URL: ${{ secrets.HEALTH_CHECK_URL }}
          EXPECTED: ${{ steps.tag_version.outputs.new_tag }}
        run: |
          if [ -z "$HEALTH_URL" ]; then
            echo "HEALTH_CHECK_URL secret not set — skipping deploy verification."
            echo "(Add a secret named HEALTH_CHECK_URL pointing at https://your-host/api/health to enable end-to-end deploy confirmation.)"
            exit 0
          fi
          echo "Waiting for deploy to land — expecting appVersion=$EXPECTED at $HEALTH_URL"
          for i in 1 2 3 4 5 6; do
            sleep 20
            ACTUAL=$(curl -fsS --max-time 5 "$HEALTH_URL" 2>/dev/null | jq -r '.appVersion // empty' 2>/dev/null || echo "")
            echo "Attempt $i/6 (~${i}0s in): appVersion=${ACTUAL:-<unreachable>}"
            if [ "$ACTUAL" = "$EXPECTED" ]; then
              echo "Deploy confirmed: server is on $ACTUAL"
              exit 0
            fi
          done
          echo "::error::After ~2min, $HEALTH_URL still reports appVersion='$ACTUAL' (expected '$EXPECTED'). Portainer received the webhook but the container did not redeploy with the new image. Check the stack's 'pull image when triggered' / image-tag-strategy in Portainer."
          exit 1
