name: Docker Builder

on:
  workflow_dispatch:
  push:
    branches:
      - main
    tags:
      - "*"
    paths-ignore:
      - "*.md"
      - "docs/**"
      - "wiki/**"
      - ".github/**"
      - "LICENSE*"
      - ".gitignore"
      - "CLAUDE.md"
  pull_request:
    branches: [main]
    paths-ignore:
      - "*.md"
      - "docs/**"
      - "wiki/**"
      - ".github/**"
      - "LICENSE*"
      - ".gitignore"
      - "CLAUDE.md"

permissions:
  contents: write
  actions: write
  packages: write

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:
  docker:
    name: Build and Publish
    runs-on: ubuntu-latest
    steps:

      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Build frontend
        run: npm run build

      - name: Smoke test
        run: |
          DB_PATH=./test-smoke.db node server.js &
          sleep 2
          curl -sf http://localhost:3001/api/health
          curl -sf http://localhost:3001/ | grep -q '<div id="root">'
          JS_FILE=$(curl -s http://localhost:3001/ | grep -o 'src="/assets/index-[^"]*\.js"' | head -1 | sed 's/src="//;s/"//')
          curl -sf http://localhost:3001${JS_FILE} | node -e "let d='';process.stdin.on('data',c=>d+=c);process.stdin.on('end',()=>{try{new Function(d);console.log('JS OK')}catch(e){console.error('JS FAIL:',e.message);process.exit(1)}})"
          kill %1 2>/dev/null || true
          rm -f ./test-smoke.db

      - name: Set Docker Tag
        id: tag
        run: |
          if [[ $GITHUB_REF == refs/heads/main ]]; then
            DOCKER_TAG="latest"
          else
            DOCKER_TAG="${GITHUB_REF#refs/tags/}"
          fi
          echo "tag=${DOCKER_TAG}" >> $GITHUB_OUTPUT

      - name: Bump version and push tag
        if: github.ref == 'refs/heads/main'
        id: tag_version
        uses: mathieudutour/github-tag-action@v6.2
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          custom_release_rules: major:major,breaking:major,minor:minor,feat:minor,patch:patch,fix:patch

      - name: Create a GitHub release
        if: github.ref == 'refs/heads/main'
        uses: ncipollo/release-action@v1
        with:
          tag: ${{ steps.tag_version.outputs.new_tag }}
          name: Release ${{ steps.tag_version.outputs.new_tag }}
          body: ${{ steps.tag_version.outputs.changelog }}

      - name: Set up QEMU
        if: github.event_name != 'pull_request'
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        if: github.event_name != 'pull_request'
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        if: github.event_name != 'pull_request'
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      # Tag push — build with just that tag
      - name: Build and Push Tag Image
        if: startsWith(github.ref, 'refs/tags/')
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          sbom: true
          provenance: mode=max
          platforms: linux/amd64,linux/arm64
          build-args: APP_VERSION=${{ steps.tag.outputs.tag }}
          tags: |
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ steps.tag.outputs.tag }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      # Main push — build with latest + auto-bumped version tag
      - name: Build and Push Main Image
        if: github.ref == 'refs/heads/main'
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          sbom: true
          provenance: mode=max
          platforms: linux/amd64,linux/arm64
          build-args: APP_VERSION=${{ steps.tag_version.outputs.new_tag }}
          tags: |
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ steps.tag.outputs.tag }}
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ steps.tag_version.outputs.new_tag }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Connect to Tailscale
        if: github.ref == 'refs/heads/main'
        continue-on-error: true
        id: tailscale
        uses: tailscale/github-action@v2
        with:
          oauth-client-id: ${{ secrets.TS_OAUTH_CLIENT_ID }}
          oauth-secret: ${{ secrets.TS_OAUTH_SECRET }}
          tags: tag:ci

      - name: Trigger Portainer redeploy
        if: github.ref == 'refs/heads/main'
        run: |
          if [ "${{ steps.tailscale.outcome }}" != "success" ]; then
            echo "::error::Tailscale connection failed (outcome=${{ steps.tailscale.outcome }}). Portainer auto-deploy skipped — image is in GHCR but the running container will not auto-update. Pull the new image manually."
            exit 1
          fi
          curl -f -X POST "${{ secrets.PORTAINER_WEBHOOK_URL }}"
