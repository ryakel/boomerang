<!doctype html>
<!-- KEPT motion prototype — dev-only render harness, never shipped.
     The §8 interaction vocabulary: catch / throw / return.
     ?demo=catch|throw|return picks one looping motion (default: catch). -->
<html lang="en">
<head>
<meta charset="UTF-8" />
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700&family=Syne:wght@700;800&display=swap" rel="stylesheet" />
<title>Kept — motion</title>
<style>
  :root {
    --bm-bg: #16140F; --bm-card: #1F1C16; --bm-card-2: #29251E;
    --bm-hairline: rgba(243,238,229,.09); --bm-hairline-strong: rgba(243,238,229,.17);
    --bm-text: #F3EEE5; --bm-text-meta: rgba(243,238,229,.56); --bm-text-faint: rgba(243,238,229,.34);
    --bm-ember: #F26640; --bm-ember-soft: rgba(242,102,64,.15); --bm-on-ember: #2A1206;
    --bm-gold: #E8B04B;
    --bm-f-eucalypt: #62B98B; --bm-f-river: #6FA6C9; --bm-f-dusk: #9D87D6;
    --bm-shadow: 0 1px 2px rgba(0,0,0,.45), 0 10px 28px rgba(0,0,0,.30);
  }
  * { box-sizing: border-box; }
  body { margin:0; padding:26px; background:#080C09; font-family:'DM Sans',system-ui,sans-serif; }
  .phone { width:390px; height:560px; background:var(--bm-bg); color:var(--bm-text);
    border-radius:28px; overflow:hidden; position:relative; display:flex; flex-direction:column; }
  .screen { flex:1 1 auto; padding:18px 16px; overflow:hidden; }
  .h1 { font-family:'Syne',sans-serif; font-weight:800; font-size:24px; letter-spacing:-.01em; margin:2px 2px 4px; }
  .sub { font-size:12.5px; color:var(--bm-text-meta); margin:0 2px 14px; }

  .rows { display:flex; flex-direction:column; }
  .row { display:flex; align-items:flex-start; gap:13px; padding:14px 2px;
    border-bottom:1px solid var(--bm-hairline); overflow:hidden; }
  .chk { flex:0 0 auto; width:24px; height:24px; margin-top:1px; position:relative;
    border-radius:50%; border:2px solid var(--bm-ember); background:transparent;
    display:grid; place-items:center; padding:0;
    transition: background .22s cubic-bezier(.3,1.2,.4,1), border-color .22s ease; }
  .chk.done { background:var(--bm-ember); border-color:var(--bm-ember); }
  .chk svg { width:13px; height:13px; transform:scale(0);
    transition: transform .26s cubic-bezier(.3,1.5,.4,1); }
  .chk.done svg { transform:scale(1); }
  .return-dot { position:absolute; left:50%; top:50%; width:9px; height:9px; margin:-4.5px 0 0 -4.5px;
    border-radius:50%; background:var(--bm-gold); opacity:0; pointer-events:none; }
  .row-body { flex:1 1 auto; min-width:0; }
  .row-title { font-size:15px; font-weight:550; line-height:1.3; position:relative; display:inline-block;
    transition: color .3s ease; }
  .row-title .strike { position:absolute; left:0; top:55%; height:2px; width:100%;
    background:var(--bm-text-meta); transform:scaleX(0); transform-origin:left;
    border-radius:2px; }
  .row.done .row-title { color:var(--bm-text-meta); }
  .row-meta { display:flex; flex-wrap:wrap; align-items:center; gap:10px; margin-top:4px;
    font-size:12px; color:var(--bm-text-meta); }
  .due-hot { color:var(--bm-ember); font-weight:650; }
  .tagdot { display:inline-flex; align-items:center; gap:5px; }
  .tagdot i { width:6px; height:6px; border-radius:50%; display:inline-block; }
  .return-chip { display:inline-flex; align-items:center; gap:5px; font-size:11.5px; font-weight:650;
    color:var(--bm-text-meta); border:1px dashed var(--bm-hairline-strong); border-radius:10px; padding:2px 9px; }

  /* bottom nav + Throw */
  .nav { position:absolute; left:0; right:0; bottom:0; display:flex; align-items:flex-end;
    background:color-mix(in srgb,var(--bm-card) 94%,transparent); backdrop-filter:blur(14px);
    border-top:1px solid var(--bm-hairline); padding:8px 6px 16px; }
  .nav-tab { flex:1 1 0; display:flex; flex-direction:column; align-items:center; gap:3px;
    color:var(--bm-text-faint); font-size:10.5px; font-weight:600; padding-top:4px; }
  .nav-tab.on { color:var(--bm-ember); }
  .throw { flex:0 0 64px; height:56px; margin:0 2px; position:relative; top:-18px; }
  .throw-btn { width:56px; height:56px; margin:0 auto; border-radius:50%;
    background:var(--bm-ember); color:var(--bm-on-ember); display:grid; place-items:center;
    box-shadow:0 8px 22px color-mix(in srgb,var(--bm-ember) 45%,transparent); border:none; }
  .caption { position:absolute; left:0; right:0; bottom:74px; text-align:center;
    font-size:12px; font-weight:700; letter-spacing:.12em; text-transform:uppercase; color:var(--bm-text-faint); }
  svg { display:block; }
</style>
</head>
<body>
<div class="phone">
  <div class="screen">
    <div class="h1">Today</div>
    <div class="sub">Wednesday, June 10</div>
    <div class="rows" id="list">
      <div class="row" data-kind="catch">
        <button class="chk"><svg viewBox="0 0 24 24" fill="none" stroke="var(--bm-on-ember)" stroke-width="3.4"><path d="M20 6 9 17l-5-5"/></svg><span class="return-dot"></span></button>
        <div class="row-body">
          <div class="row-title">deal with the insurance claim<span class="strike"></span></div>
          <div class="row-meta"><span class="due-hot">7d overdue</span><span class="tagdot"><i style="background:var(--bm-f-river)"></i>finance</span></div>
        </div>
      </div>
      <div class="row" data-kind="return">
        <button class="chk"><svg viewBox="0 0 24 24" fill="none" stroke="var(--bm-on-ember)" stroke-width="3.4"><path d="M20 6 9 17l-5-5"/></svg><span class="return-dot"></span></button>
        <div class="row-body">
          <div class="row-title">draft the trip packing list<span class="strike"></span></div>
          <div class="row-meta"><span>today</span><span class="tagdot"><i style="background:var(--bm-f-eucalypt)"></i>errands</span></div>
        </div>
      </div>
      <div class="row" data-kind="plain">
        <button class="chk"><svg viewBox="0 0 24 24" fill="none" stroke="var(--bm-on-ember)" stroke-width="3.4"><path d="M20 6 9 17l-5-5"/></svg><span class="return-dot"></span></button>
        <div class="row-body">
          <div class="row-title">renew passport before the trip<span class="strike"></span></div>
          <div class="row-meta"><span>Fri</span><span class="tagdot"><i style="background:var(--bm-f-dusk)"></i>travel</span></div>
        </div>
      </div>
    </div>
  </div>
  <div class="caption" id="cap"></div>
  <div class="nav">
    <div class="nav-tab on">Today</div>
    <div class="nav-tab">Loops</div>
    <div class="throw"><button class="throw-btn" id="throwBtn"><svg id="throwMark" width="27" height="27" viewBox="0 0 100 100" fill="none"><path d="M 22 52 C 30 18, 70 18, 78 52" stroke="currentColor" stroke-width="11" stroke-linecap="round"/><circle cx="78" cy="52" r="8" fill="currentColor"/><path d="M 30 70 C 42 82, 58 82, 70 70" stroke="currentColor" stroke-width="10" stroke-linecap="round" opacity=".6"/></svg></button></div>
    <div class="nav-tab">Tasks</div>
    <div class="nav-tab">More</div>
  </div>
</div>

<script>
  const SPRING = 'cubic-bezier(.3,1.4,.4,1)';
  const reduce = matchMedia('(prefers-reduced-motion: reduce)').matches;
  const mode = new URLSearchParams(location.search).get('demo') || 'catch';
  const cap = document.getElementById('cap');
  const list = document.getElementById('list');
  const wait = ms => new Promise(r => setTimeout(r, ms));

  // ── CATCH — completing a task: the boomerang returns into the check ──────
  async function doCatch(row) {
    const chk = row.querySelector('.chk');
    const dot = row.querySelector('.return-dot');
    const strike = row.querySelector('.strike');
    // the gold dot arcs up-and-back INTO the check (the return)
    dot.animate([
      { transform:'translate(26px,-30px) scale(.5)', opacity:0, offset:0 },
      { opacity:1, offset:.25 },
      { transform:'translate(11px,-13px) scale(.95)', opacity:1, offset:.6 },
      { transform:'translate(0,0) scale(1)', opacity:1, offset:1 },
    ], { duration:440, easing:'cubic-bezier(.3,1.05,.3,1)', fill:'forwards' });
    await wait(330);
    chk.classList.add('done');           // check fills as the dot lands
    dot.animate([{opacity:1},{opacity:0}], { duration:160, fill:'forwards' });
    strike.animate([{transform:'scaleX(0)'},{transform:'scaleX(1)'}], { duration:300, easing:'ease-out', fill:'forwards' });
    row.classList.add('done');
    row.animate([{transform:'translateY(0)'},{transform:'translateY(3px)'},{transform:'translateY(0)'}],
      { duration:300, easing:'ease-out' });
  }
  function resetCatch(row) {
    row.classList.remove('done');
    row.querySelector('.chk').classList.remove('done');
    const s = row.querySelector('.strike'); s.getAnimations().forEach(a=>a.cancel()); s.style.transform='scaleX(0)';
    const d = row.querySelector('.return-dot'); d.getAnimations().forEach(a=>a.cancel()); d.style.opacity='0'; d.style.transform='';
  }

  // ── THROW — capture: the button kicks, a new row drops in on an arc ──────
  function doThrow() {
    const mark = document.getElementById('throwMark');
    mark.animate([
      { transform:'rotate(0)' }, { transform:'rotate(-15deg) scale(1.06)', offset:.35 }, { transform:'rotate(0) scale(1)' }
    ], { duration:440, easing:'cubic-bezier(.3,1.5,.4,1)' });
    const row = document.createElement('div');
    row.className = 'row'; row.dataset.added = '1';
    row.innerHTML = `<button class="chk"><svg viewBox="0 0 24 24" fill="none" stroke="var(--bm-on-ember)" stroke-width="3.4"><path d="M20 6 9 17l-5-5"/></svg><span class="return-dot"></span></button>
      <div class="row-body"><div class="row-title">call the pharmacy<span class="strike"></span></div>
      <div class="row-meta"><span>just now</span></div></div>`;
    list.insertBefore(row, list.firstChild);
    row.animate([
      { transform:'translateY(-20px) rotate(-2.5deg)', opacity:0, offset:0 },
      { transform:'translateY(3px) rotate(.5deg)', opacity:1, offset:.7 },
      { transform:'translateY(0) rotate(0)', opacity:1, offset:1 },
    ], { duration:420, easing:SPRING, fill:'backwards' });
  }
  function resetThrow() { list.querySelectorAll('[data-added]').forEach(r=>r.remove()); }

  // ── RETURN — throw it back (snooze): row flies off, chip stamps in ───────
  async function doReturn(row) {
    const startH = row.offsetHeight;
    await row.animate([
      { transform:'translate(0,0)', opacity:1, offset:0 },
      { transform:'translate(16px,-7px)', opacity:1, offset:.28 },
      { transform:'translate(130px,3px)', opacity:0, offset:1 },
    ], { duration:460, easing:'cubic-bezier(.4,.0,.5,1)', fill:'forwards' }).finished;
    // collapse the gap, then re-reveal as a snoozed row with the return chip
    row.animate([{ height:startH+'px' },{ height:'0px', paddingTop:'0px', paddingBottom:'0px' }],
      { duration:240, easing:'ease', fill:'forwards' });
    await wait(240);
    row.querySelector('.row-meta').innerHTML = '<span class="return-chip">↩ returns Tue</span>';
    row.querySelector('.row-title').style.color = 'var(--bm-text-meta)';
    row.style.height=''; row.style.paddingTop=''; row.style.paddingBottom='';
    row.animate([{height:'0px'},{height:startH+'px'}], { duration:240, easing:'ease', fill:'backwards' });
    row.style.transform='translate(0,0)'; row.style.opacity='.7';
    const chip = row.querySelector('.return-chip');
    chip.animate([
      { transform:'scale(.5)', opacity:0 }, { transform:'scale(1.12)', opacity:1, offset:.6 }, { transform:'scale(1)', opacity:1 }
    ], { duration:360, easing:'cubic-bezier(.3,1.5,.4,1)', fill:'backwards' });
  }
  function resetReturn(row) {
    row.style.transform=''; row.style.opacity=''; row.style.height='';
    row.querySelector('.row-title').style.color='';
    row.querySelector('.row-meta').innerHTML = '<span>today</span><span class="tagdot"><i style="background:var(--bm-f-eucalypt)"></i>errands</span>';
  }

  const CAPS = { catch:'Catch', throw:'Throw', return:'Throw it back' };
  async function loop() {
    cap.textContent = CAPS[mode] || '';
    if (reduce) { // static end-states
      if (mode==='catch') doCatch(document.querySelector('[data-kind=catch]'));
      if (mode==='throw') doThrow();
      if (mode==='return') doReturn(document.querySelector('[data-kind=return]'));
      return;
    }
    while (true) {
      await wait(700);
      if (mode==='catch') { const r=document.querySelector('[data-kind=catch]'); await doCatch(r); await wait(1700); resetCatch(r); }
      else if (mode==='throw') { doThrow(); await wait(2000); resetThrow(); }
      else if (mode==='return') { const r=document.querySelector('[data-kind=return]'); await doReturn(r); await wait(1900); resetReturn(r); }
      await wait(500);
    }
  }
  loop();
</script>
</body>
</html>
