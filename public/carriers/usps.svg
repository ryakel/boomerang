<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 140 100">
  <rect width="140" height="100" fill="#004B87"/>
  <!-- Eagle head silhouette -->
  <g fill="#FFFFFF">
    <path d="M20 55 C20 35, 35 18, 55 15 C65 14, 80 16, 95 22 L120 10 L110 28 C100 22, 85 18, 70 20 C50 24, 35 38, 30 55 Z"/>
    <!-- Beak -->
    <path d="M20 55 L8 52 L22 48 Z" fill="#D00"/>
  </g>
  <!-- UNITED STATES text -->
  <text x="70" y="72" text-anchor="middle" fill="#FFFFFF" font-size="10" font-weight="700" font-family="Arial,sans-serif" letter-spacing="2.5">UNITED STATES</text>
  <!-- POSTAL SERVICE text -->
  <text x="70" y="86" text-anchor="middle" fill="#FFFFFF" font-size="10" font-weight="700" font-family="Arial,sans-serif" letter-spacing="2.5">POSTAL SERVICE</text>
  <!-- Registered mark -->
  <text x="126" y="88" fill="#FFFFFF" font-size="6" font-family="Arial,sans-serif">\u00AE</text>
</svg>
