name: boomerang-dev

services:
  boomerang-dev:
    image: ghcr.io/ryakel/boomerang:dev
    container_name: boomerang-dev
    ports:
      - "${PORT:-3002}:${PORT:-3002}"
    environment:
      - PORT=${PORT:-3002}
      - ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY:-}
      - NOTION_INTEGRATION_TOKEN=${NOTION_INTEGRATION_TOKEN:-}
      - TRELLO_API_KEY=${TRELLO_API_KEY:-}
      - TRELLO_SECRET=${TRELLO_SECRET:-}
      - GOOGLE_CLIENT_ID=${GOOGLE_CLIENT_ID:-}
      - GOOGLE_CLIENT_SECRET=${GOOGLE_CLIENT_SECRET:-}
      - TRACKING_API_KEY=${TRACKING_API_KEY:-}
      - DB_PATH=/data/boomerang.db
      - SEED_DB=${SEED_DB:-0}
    volumes:
      - boomerang-dev-data:/data
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://localhost:${PORT:-3002}/api/health"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s
    restart: unless-stopped

volumes:
  boomerang-dev-data:
