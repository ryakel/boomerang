<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, user-scalable=no" />
    <meta name="theme-color" content="#0B0B0F" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <link rel="apple-touch-icon" href="/apple-touch-icon.png" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600&family=Syne:wght@700;800&display=swap" rel="stylesheet" />
    <link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,600;9..144,700&display=swap" rel="stylesheet" />
    <title>Boomerang</title>
    <script>
      // Apply the theme before first paint so v2 tokens (and the chosen
      // light/dark/wallaby variant) are in scope before React mounts.
      // Critical for the ErrorBoundary fallback: if AppV2 throws on first
      // render, the boundary still renders with the right tokens applied.
      // (v1 was removed 2026-06-10 — v2 is unconditional.)
      try {
        document.documentElement.setAttribute('data-ui', 'v2')
        var s = JSON.parse(localStorage.getItem('boom_settings_v1'))
        // Migrate legacy 'terminal' to 'terminal-dark' before pre-paint so
        // the right palette tokens are scoped from the very first frame.
        if (s && s.theme === 'terminal') {
          s.theme = 'terminal-dark'
          try { localStorage.setItem('boom_settings_v1', JSON.stringify(s)) } catch(_) {}
        }
        // Terminal mode turned off (2026-06-06): migrate to Wallaby pre-paint so
        // current terminal users don't flash the terminal palette on first load.
        if (s && (s.theme === 'terminal-dark' || s.theme === 'terminal-light')) {
          s.theme = s.theme === 'terminal-light' ? 'wallaby-light' : 'wallaby-dark'
          try { localStorage.setItem('boom_settings_v1', JSON.stringify(s)) } catch(_) {}
        }
        var themeColors = {
          light: '#FFFFFF',
          dark: '#0B0B0F',
          'wallaby-dark': '#0E1322',
          'wallaby-light': '#F4F6FB',
          'kept-dark': '#16140F',
          'kept-light': '#F8F4ED'
        }
        if (s && themeColors[s.theme]) {
          document.documentElement.setAttribute('data-theme', s.theme)
          var meta = document.querySelector('meta[name="theme-color"]')
          if (meta) meta.content = themeColors[s.theme]
        }
      } catch(e) {}
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
    <script>
      if ('serviceWorker' in navigator) {
        window.addEventListener('load', function () {
          navigator.serviceWorker.register('/boomerang-sw.js', { scope: '/' })
        })
      }
    </script>
  </body>
</html>
