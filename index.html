<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, user-scalable=no" />
    <meta name="theme-color" content="#0B0B0F" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <link rel="apple-touch-icon" href="/apple-touch-icon.png" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700&family=Inter:wght@500;600;700;800&family=Syne:wght@700;800&display=swap" rel="stylesheet" />
    <title>Boomerang</title>
    <script>
      // Apply saved UI version + theme before first paint so v2 tokens (and the
      // chosen light/dark/loggd variant) are in scope before React mounts.
      // Critical for the ErrorBoundary fallback: if AppV2 throws on first
      // render, the boundary still renders with the right tokens applied.
      try {
        var v = localStorage.getItem('ui_version')
        if (v !== 'v1') document.documentElement.setAttribute('data-ui', 'v2')
        var s = JSON.parse(localStorage.getItem('boom_settings_v1'))
        // Migrate retired terminal themes onto the Loggd palette before
        // pre-paint so the right tokens are scoped from the very first frame.
        // ('terminal' was the pre-2026-05 legacy value for terminal-dark.)
        if (s && (s.theme === 'terminal' || s.theme === 'terminal-dark')) {
          s.theme = 'loggd-dark'
          try { localStorage.setItem('boom_settings_v1', JSON.stringify(s)) } catch(_) {}
        } else if (s && s.theme === 'terminal-light') {
          s.theme = 'loggd-light'
          try { localStorage.setItem('boom_settings_v1', JSON.stringify(s)) } catch(_) {}
        }
        var themeColors = {
          light: '#FFFFFF',
          dark: '#0B0B0F',
          'loggd-dark': '#0E1322',
          'loggd-light': '#F4F6FB'
        }
        if (s && themeColors[s.theme]) {
          document.documentElement.setAttribute('data-theme', s.theme)
          var meta = document.querySelector('meta[name="theme-color"]')
          if (meta) meta.content = themeColors[s.theme]
        }
      } catch(e) {}
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
    <script>
      if ('serviceWorker' in navigator) {
        window.addEventListener('load', function () {
          navigator.serviceWorker.register('/boomerang-sw.js', { scope: '/' })
        })
      }
    </script>
  </body>
</html>
